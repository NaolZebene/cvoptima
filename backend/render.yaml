services:
  - type: web
    name: cvoptima-backend
    env: node
    region: frankfurt  # EU region for better latency in Europe
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        fromDatabase:
          name: cvoptima-mongodb
          property: connectionString
      - key: CORS_ORIGIN
        value: https://cvoptima.vercel.app,https://naolzebene.github.io
      - key: DEEPSEEK_API_KEY
        sync: false  # Will be set manually
      - key: STRIPE_SECRET_KEY
        sync: false  # Will be set manually
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false  # Will be set manually
      - key: STRIPE_WEBHOOK_SECRET
        sync: false  # Will be set manually

databases:
  - name: cvoptima-mongodb
    databaseName: cvoptima
    plan: free
    region: frankfurt