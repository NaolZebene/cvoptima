services:
  - type: web
    name: cvoptima-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server-light.js
    healthCheckPath: /health
    disk:
      name: cvoptima-uploads
      mountPath: /opt/render/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: CORS_ORIGIN
        value: https://cvoptima.vercel.app,http://localhost:3001
      - key: UPLOADS_DIR
        value: /opt/render/uploads