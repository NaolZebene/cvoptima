services:
  - type: web
    name: cvoptima-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server-light.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://cvoptima.vercel.app